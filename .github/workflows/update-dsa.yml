name: Update DSA Progress

on:
  schedule:
    - cron: "0 */12 * * *"  # Every 12 hours
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dsa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout DSA Practice repo
        uses: actions/checkout@v4
        with:
          repository: LoveTechX/dsa-practice
          path: dsa-data
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Count DSA problems and update README
        run: |
          # Count solution files
          TOTAL=$(find ./dsa-data -type f \( -name "*.cpp" -o -name "*.py" -o -name "*.c" -o -name "*.java" \) | wc -l)
          
          # Get commit date for timestamp
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          
          # Create DSA progress content
          read -r -d '' DSA_CONTENT << 'EOF' || true
          **Total Problems Solved: ${TOTAL}**
          
          Last updated: **${TIMESTAMP}**
          EOF
          
          # Replace the placeholder in README
          sed -i "/<!--START_SECTION:dsa-->/,/<!--END_SECTION:dsa-->/c\\
          <!--START_SECTION:dsa-->\\
          **Total Problems Solved: $TOTAL**\\
          \\
          Last updated: **$TIMESTAMP**\\
          <!--END_SECTION:dsa-->" README.md

      - name: Commit and push changes
        uses: EndBug/add-and-commit@v9
        with:
          message: "chore: update DSA progress - ${{ job.status }}"
          add: "README.md"
          default_author: github_actions

