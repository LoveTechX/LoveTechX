name: Update README Activity

on:
  schedule:
    - cron: "30 0 * * *"  # Daily at 12:30 AM UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: readme-activity
  cancel-in-progress: true

jobs:
  update-activity:
    runs-on: ubuntu-latest
    steps:
      - name: Update README with recent activity
        uses: jamesgeorge007/github-activity-readme@v0.4.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          COMMIT_MSG: "chore: update README activity"
          MAX_LINES: 8

